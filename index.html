<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddisGo | Ride Comparison & Essentials</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="nav-main">
                <h1>AddisGo <span class="gold">Pro</span></h1>
                <button id="lang-toggle" onclick="toggleLanguage()">አማርኛ</button>
            </div>
            <p id="sub-header">Live Ride Comparison & Market Board</p>
        </header>

        <main class="content-split">
            <div id="map"></div>

            <div class="sidebar">
                <section class="card">
                    <h2 id="h-route">Global Route Finder</h2>
                    <input type="text" id="start" placeholder="Select Start on Map" readonly>
                    <input type="text" id="dest" placeholder="Select Destination" readonly>
                    <button class="primary-btn" onclick="openComparison()">Compare Rides</button>
                </section>

                <section class="card clickable" onclick="openFullCalendar()">
                    <div class="cal-preview">
                        <span id="box-eth-date">Loading Date...</span>
                        <span class="gold">VIEW HOLIDAYS →</span>
                    </div>
                </section>

                <div class="double-grid">
                    <section class="card">
                        <h2 id="h-market">Market</h2>
                        <div id="ess-grid" class="info-list"></div>
                    </section>
                    <section class="card">
                        <h2 id="h-fuel">Fuel</h2>
                        <div id="fuel-grid" class="info-list"></div>
                    </section>
                </div>

                <section class="card">
                    <h2 id="h-curr">Forex Board</h2>
                    <div id="curr-list"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-box">
            <div class="modal-nav">
                <button onclick="changeMonth(-1)">❮</button>
                <h3 id="cal-month-year">...</h3>
                <button onclick="changeMonth(1)">❯</button>
                <span class="close-icon" onclick="closeCalendar()">×</span>
            </div>
            <div id="calendar-grid" class="cal-grid"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
